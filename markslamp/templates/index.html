<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>markslamp</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --glow: #e94560;
    --text: #eee;
    --dim: #888;
    --on: #4ade80;
    --off: #ef4444;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header h1 span { color: var(--glow); }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.95); }
  .btn-scan {
    background: var(--glow);
    color: white;
  }
  .btn-scan:disabled {
    opacity: 0.5;
  }

  .status-bar {
    padding: 10px 20px;
    background: var(--accent);
    font-size: 0.85rem;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
  }

  #lamps {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  /* Z Fold 6 unfolded: 2 columns look great */
  @media (min-width: 600px) {
    #lamps { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  }
  @media (min-width: 1000px) {
    #lamps { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  }

  .lamp-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--accent);
    transition: border-color 0.3s;
  }
  .lamp-card.lamp-on { border-color: var(--on); }

  .lamp-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .lamp-name { font-weight: 600; font-size: 1.05rem; }
  .lamp-meta { font-size: 0.75rem; color: var(--dim); }
  .lamp-protocol {
    font-size: 0.7rem;
    background: var(--accent);
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .switches { padding: 8px 18px 14px; }

  .switch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    min-height: 48px;  /* touch-friendly */
  }
  .switch-row:last-child { border-bottom: none; }
  .switch-label {
    font-size: 0.85rem;
    color: var(--dim);
    min-width: 90px;
  }
  .switch-value { flex: 1; text-align: right; }

  /* Toggle switch */
  .toggle {
    width: 56px;
    height: 30px;
    border-radius: 15px;
    background: #333;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    touch-action: manipulation;
  }
  .toggle.on { background: var(--on); }
  .toggle::after {
    content: '';
    width: 24px;
    height: 24px;
    border-radius: 12px;
    background: white;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: transform 0.3s;
  }
  .toggle.on::after { transform: translateX(26px); }

  /* Range slider */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    max-width: 200px;
    height: 6px;
    border-radius: 3px;
    background: #333;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    background: var(--glow);
    cursor: pointer;
  }

  /* Button (momentary press) */
  .btn-press {
    background: var(--accent);
    color: var(--text);
    border: 1px solid #555;
    border-radius: 10px;
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .btn-press:active {
    background: var(--glow);
    transform: scale(0.93);
  }

  /* Color picker */
  input[type=color] {
    -webkit-appearance: none;
    border: 2px solid var(--accent);
    border-radius: 8px;
    width: 48px;
    height: 36px;
    cursor: pointer;
    background: transparent;
  }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type=color]::-webkit-color-swatch { border-radius: 4px; border: none; }

  /* Select dropdown */
  select {
    background: var(--accent);
    color: var(--text);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    max-width: 200px;
  }

  .range-val {
    font-size: 0.8rem;
    color: var(--dim);
    min-width: 40px;
    text-align: right;
    margin-left: 8px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }
  .empty-state h2 { font-size: 1.3rem; margin-bottom: 12px; color: var(--text); }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--dim);
    border-top-color: var(--glow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>mark<span>slamp</span></h1>
  <button class="btn btn-scan" id="scanBtn" onclick="doScan()">Scan</button>
</header>

<div class="status-bar">
  <span id="statusText">Ready</span>
  <span id="lampCount">0 lamps</span>
</div>

<div id="lamps"></div>

<script>
const API = '';
let lamps = {};

async function doScan() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Scanning...';
  document.getElementById('statusText').textContent = 'Scanning network...';

  try {
    const res = await fetch(API + '/api/scan', { method: 'POST' });
    const data = await res.json();
    lamps = data.lamps || {};
    render();
    document.getElementById('statusText').textContent = 'Scan complete';
  } catch (e) {
    document.getElementById('statusText').textContent = 'Scan failed: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Scan';
  }
}

function render() {
  const container = document.getElementById('lamps');
  const ids = Object.keys(lamps);
  document.getElementById('lampCount').textContent = ids.length + ' lamp(s)';

  if (ids.length === 0) {
    container.innerHTML = '<div class="empty-state"><h2>No lamps found</h2><p>Tap Scan to search your network</p></div>';
    return;
  }

  container.innerHTML = ids.map(id => {
    const lamp = lamps[id];
    const sw = lamp.switches || {};
    const isOn = sw.power && sw.power.value;
    return `
      <div class="lamp-card ${isOn ? 'lamp-on' : ''}" id="card-${css(id)}">
        <div class="lamp-header">
          <div>
            <div class="lamp-name">${esc(lamp.name)}</div>
            <div class="lamp-meta">${esc(lamp.ip)}</div>
          </div>
          <span class="lamp-protocol">${esc(lamp.protocol)}</span>
        </div>
        <div class="switches">
          ${Object.entries(sw).map(([name, s]) => switchRow(id, name, s)).join('')}
        </div>
      </div>`;
  }).join('');
}

function switchRow(lampId, name, sw) {
  const label = name.replace(/_/g, ' ');
  let control = '';

  if (sw.type === 'toggle') {
    control = `<div class="toggle ${sw.value ? 'on' : ''}" onclick="setSwitch('${esc(lampId)}','${esc(name)}',${!sw.value})"></div>`;
  } else if (sw.type === 'range') {
    const min = sw.min_val ?? 0;
    const max = sw.max_val ?? 255;
    const val = sw.value ?? min;
    control = `<input type="range" min="${min}" max="${max}" value="${val}"
      onchange="setSwitch('${esc(lampId)}','${esc(name)}',Number(this.value)); this.nextElementSibling.textContent=this.value"
      ><span class="range-val">${val}</span>`;
  } else if (sw.type === 'color') {
    const rgb = Array.isArray(sw.value) ? sw.value : [255,255,255];
    const hex = '#' + rgb.slice(0,3).map(c => (c||0).toString(16).padStart(2,'0')).join('');
    control = `<input type="color" value="${hex}"
      onchange="setSwitch('${esc(lampId)}','${esc(name)}',hexToRgb(this.value))">`;
  } else if (sw.type === 'select') {
    const opts = (sw.options || []).map(o =>
      `<option value="${esc(o)}" ${String(sw.value)===String(o)?'selected':''}>${esc(o)}</option>`
    ).join('');
    control = `<select onchange="setSwitch('${esc(lampId)}','${esc(name)}',this.value)">${opts}</select>`;
  } else if (sw.type === 'button') {
    control = `<button class="btn-press" onclick="setSwitch('${esc(lampId)}','${esc(name)}',true)">Press</button>`;
  } else {
    control = `<span>${esc(String(sw.value))}</span>`;
  }

  return `<div class="switch-row"><span class="switch-label">${esc(label)}</span><div class="switch-value">${control}</div></div>`;
}

async function setSwitch(lampId, switchName, value) {
  try {
    const res = await fetch(API + '/api/switch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ lamp_id: lampId, switch_name: switchName, value: value })
    });
    const data = await res.json();
    if (data.ok && lamps[lampId] && lamps[lampId].switches[switchName]) {
      lamps[lampId].switches[switchName].value = value;
      // Re-render to update toggle states and card borders
      if (switchName === 'power') render();
    }
  } catch (e) {
    console.error('Set switch failed:', e);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function css(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

// Auto-scan on load
doScan();
</script>
</body>
</html>
