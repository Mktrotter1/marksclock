# markslamp RF Bridge - ESPHome config for 433MHz lamp control
#
# Hardware: ESP32 + 433MHz TX/RX module
#   - RX data pin → GPIO4 (receive/sniff remote codes)
#   - TX data pin → GPIO5 (transmit to lamp relay)
#   - VCC → 3.3V, GND → GND
#
# Usage:
#   1. Flash this config: esphome run rf_bridge.yaml
#   2. Press the lamp's physical remote - codes appear in ESPHome logs
#   3. Copy the codes into the remote_transmitter section below
#   4. markslamp discovers this device and shows button switches
#
# Wiring (cheapest option ~$3 total):
#   - ESP32-C3 SuperMini (~$2)
#   - SYN480R receiver + SYN115 transmitter (~$1 pair)

esphome:
  name: markslamp-rf-bridge
  friendly_name: "markslamp RF Bridge"

esp32:
  board: esp32dev
  # Change to esp32-c3-devkitm-1 for ESP32-C3

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  password: ""

logger:
  level: DEBUG

# --- RF RECEIVER (sniff remote codes) ---
remote_receiver:
  pin:
    number: GPIO4
    inverted: false
  dump:
    - rc_switch    # most 433MHz lamp remotes use this
    - raw          # fallback: dump raw timings

# --- RF TRANSMITTER (replay to lamp) ---
remote_transmitter:
  pin: GPIO5
  carrier_duty_percent: 100%  # OOK modulation (standard for 433MHz)

# --- LAMP CONTROL BUTTONS ---
# After sniffing your remote, replace the placeholder codes below.
# Run `esphome logs rf_bridge.yaml`, press your remote, and copy
# the rc_switch code that appears.

button:
  - platform: template
    name: "Lamp Cycle"
    icon: "mdi:lamp"
    id: lamp_cycle
    on_press:
      - remote_transmitter.transmit_rc_switch_raw:
          # REPLACE with your sniffed code:
          code: "110001010101000101010101"
          protocol: 1
          repeat:
            times: 5
            wait_time: 0ms

  - platform: template
    name: "Lamp Off"
    icon: "mdi:lamp-outline"
    id: lamp_off
    on_press:
      # Send cycle pulses with delay to land on OFF state
      # Adjust count based on how many states your lamp has
      - remote_transmitter.transmit_rc_switch_raw:
          code: "110001010101000101010101"
          protocol: 1
          repeat:
            times: 5
            wait_time: 0ms
      - delay: 300ms
      - remote_transmitter.transmit_rc_switch_raw:
          code: "110001010101000101010101"
          protocol: 1
          repeat:
            times: 5
            wait_time: 0ms
      - delay: 300ms
      - remote_transmitter.transmit_rc_switch_raw:
          code: "110001010101000101010101"
          protocol: 1
          repeat:
            times: 5
            wait_time: 0ms
      - delay: 300ms
      - remote_transmitter.transmit_rc_switch_raw:
          code: "110001010101000101010101"
          protocol: 1
          repeat:
            times: 5
            wait_time: 0ms

